name: F&O Spatial Engine

on:
  schedule:
    # Every 5 minutes, 03:00–10:59 UTC (≈ 08:30–16:29 IST), Monday–Friday
    - cron: "*/5 3-10 * * 1-5"
  workflow_dispatch:
    inputs:
      backtest_date:
        description: 'Backtest Date (YYYY-MM-DD).'
        required: false
        default: ''
      from_time:
        description: 'Batch Start Time (HH:MM).'
        required: false
        default: ''
      to_time:
        description: 'Batch End Time (HH:MM).'
        required: false
        default: ''
      interval:
        description: 'Batch Step Interval in mins.'
        required: false
        default: '60'

jobs:
  run-strategy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fyers_apiv3 pandas numpy scipy ta yfinance PyYAML opencv-python-headless torch

      # ---------------------------------------------------------
      # 1. DOWNLOAD DATABASE FROM CLOUD CACHE
      # ---------------------------------------------------------
      - name: Restore Spatial Database Cache
        uses: actions/cache/restore@v4
        with:
          path: spatial_matrix_atlas.db
          key: spatial-db-${{ github.run_id }}
          restore-keys: |
            spatial-db-

      # ---------------------------------------------------------
      # 2. RUN THE ENGINE (Emails are sent directly from Python)
      # ---------------------------------------------------------
      - name: Run Spatial Engine Script
        env:
          CLIENT_ID:       ${{ secrets.CLIENT_ID }}
          SECRET_KEY:      ${{ secrets.SECRET_KEY }}
          REDIRECT_URI:    ${{ secrets.REDIRECT_URI }}
          AUTH_CODE:       ${{ secrets.AUTH_CODE }}
          ACCESS_TOKEN:    ${{ secrets.ACCESS_TOKEN }}
          SENDER_EMAIL:    ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SMTP_PORT:       ${{ secrets.SMTP_PORT }}
          TZ:              Asia/Kolkata
        run: |
          B_DATE="${{ github.event.inputs.backtest_date }}"
          B_FROM="${{ github.event.inputs.from_time }}"
          B_TO="${{ github.event.inputs.to_time }}"
          B_INT="${{ github.event.inputs.interval }}"
          
          if [ -n "$B_DATE" ] && [ -n "$B_FROM" ] && [ -n "$B_TO" ]; then
            echo "Running in BATCH BACKTEST mode."
            python EMAIL.py --date "$B_DATE" --from_time "$B_FROM" --to_time "$B_TO" --interval "$B_INT"
          elif [ -n "$B_DATE" ]; then
            echo "Running in SINGLE BACKTEST mode."
            python EMAIL.py --date "$B_DATE"
          else
            echo "Running in LIVE mode."
            python EMAIL.py
          fi

      # ---------------------------------------------------------
      # 3. UPLOAD UPDATED DATABASE BACK TO CLOUD CACHE
      # ---------------------------------------------------------
      - name: Save Updated Spatial Database Cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: spatial_matrix_atlas.db
          key: spatial-db-${{ github.run_id }}
