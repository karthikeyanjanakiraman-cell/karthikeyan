name: F&O Spatial Engine

on:
  schedule:
    # Every 5 minutes, 03:00–10:59 UTC (≈ 08:30–16:29 IST), Monday–Friday
    - cron: "*/5 3-10 * * 1-5"
  workflow_dispatch:
    inputs:
      backtest_date:
        description: 'Backtest Date (YYYY-MM-DD). For Single Run use YYYY-MM-DD HH:MM. Leave empty for Live Mode.'
        required: false
        default: ''
      from_time:
        description: 'Batch Start Time (HH:MM). Leave empty for Single Run or Live Mode.'
        required: false
        default: ''
      to_time:
        description: 'Batch End Time (HH:MM). Leave empty for Single Run or Live Mode.'
        required: false
        default: ''
      interval:
        description: 'Batch Step Interval in minutes.'
        required: false
        default: '60'

permissions:
  contents: write

jobs:
  run-strategy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fyers_apiv3 pandas numpy scipy ta yfinance PyYAML opencv-python-headless torch

      # ---------------------------------------------------------
      # RUN THE ENGINE (Reads DB from repo, builds if missing)
      # ---------------------------------------------------------
      - name: Run Spatial Engine Script
        env:
          CLIENT_ID:       ${{ secrets.CLIENT_ID }}
          SECRET_KEY:      ${{ secrets.SECRET_KEY }}
          REDIRECT_URI:    ${{ secrets.REDIRECT_URI }}
          AUTH_CODE:       ${{ secrets.AUTH_CODE }}
          ACCESS_TOKEN:    ${{ secrets.ACCESS_TOKEN }}
          SENDER_EMAIL:    ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SMTP_PORT:       ${{ secrets.SMTP_PORT }}
          TZ:              Asia/Kolkata
        run: |
          B_DATE="${{ github.event.inputs.backtest_date }}"
          B_FROM="${{ github.event.inputs.from_time }}"
          B_TO="${{ github.event.inputs.to_time }}"
          B_INT="${{ github.event.inputs.interval }}"
          
          if [ -n "$B_DATE" ] && [ -n "$B_FROM" ] && [ -n "$B_TO" ]; then
            echo "Running in BATCH BACKTEST mode."
            python EMAIL.py --date "$B_DATE" --from_time "$B_FROM" --to_time "$B_TO" --interval "$B_INT"
          elif [ -n "$B_DATE" ]; then
            echo "Running in SINGLE BACKTEST mode."
            python EMAIL.py --date "$B_DATE"
          else
            echo "Running in LIVE mode."
            python EMAIL.py
          fi

      # ---------------------------------------------------------
      # PUSH DATABASE & LOGS DIRECTLY TO REPOSITORY
      # ---------------------------------------------------------
      - name: Commit Database and Logs to Repository
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Pull latest changes to avoid merge conflicts
          git fetch origin main
          git pull --rebase origin main || true
          
          # Explicitly add the database and any generated CSVs
          if [ -f "spatial_matrix_atlas.db" ]; then
            git add spatial_matrix_atlas.db
          fi
          git add *.csv || true
          
          # Commit and Push
          if git diff --cached --quiet; then
            echo "No database or log changes to commit."
          else
            git commit -m "Auto-update Spatial Atlas and Logs [skip ci]" || true
            git push origin HEAD:main || echo "Push failed; database might exceed GitHub limits."
          fi
