name: Email

on:
  schedule:
    # Every 5 minutes, 03:00–10:59 UTC (≈ 08:30–16:29 IST), Monday–Friday
    - cron: "*/5 3-10 * * 1-5"
  workflow_dispatch:
    inputs:
      backtest_date:
        description: 'Backtest Date (YYYY-MM-DD). For Single Run use YYYY-MM-DD HH:MM. Leave empty for Live Mode.'
        required: false
        default: ''
      from_time:
        description: 'Batch Start Time (HH:MM). Leave empty for Single Run or Live Mode.'
        required: false
        default: ''
      to_time:
        description: 'Batch End Time (HH:MM). Leave empty for Single Run or Live Mode.'
        required: false
        default: ''
      interval:
        description: 'Batch Step Interval in minutes (Only used if from_time and to_time are filled).'
        required: false
        default: '60'

permissions:
  contents: write

jobs:
  run-strategy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fyers_apiv3 pandas numpy scipy ta yfinance PyYAML opencv-python-headless torch

      - name: Download previous intraday DB (if exists)
        uses: actions/download-artifact@v4
        with:
          name: intraday-signals-db
          path: .
        continue-on-error: true

      - name: Run Fyers v3 email script
        env:
          CLIENT_ID:       ${{ secrets.CLIENT_ID }}
          SECRET_KEY:      ${{ secrets.SECRET_KEY }}
          REDIRECT_URI:    ${{ secrets.REDIRECT_URI }}
          AUTH_CODE:       ${{ secrets.AUTH_CODE }}
          ACCESS_TOKEN:    ${{ secrets.ACCESS_TOKEN }}
          SENDER_EMAIL:    ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SMTP_PORT:       ${{ secrets.SMTP_PORT }}
          TZ:              Asia/Kolkata
        run: |
          B_DATE="${{ github.event.inputs.backtest_date }}"
          B_FROM="${{ github.event.inputs.from_time }}"
          B_TO="${{ github.event.inputs.to_time }}"
          B_INT="${{ github.event.inputs.interval }}"
          
          if [ -n "$B_DATE" ] && [ -n "$B_FROM" ] && [ -n "$B_TO" ]; then
            echo "Running in BATCH BACKTEST mode: $B_DATE from $B_FROM to $B_TO every $B_INT mins."
            python EMAIL.py --date "$B_DATE" --from_time "$B_FROM" --to_time "$B_TO" --interval "$B_INT"
          elif [ -n "$B_DATE" ]; then
            echo "Running in SINGLE BACKTEST mode for target: $B_DATE"
            python EMAIL.py --date "$B_DATE"
          else
            echo "Running in LIVE mode."
            python EMAIL.py
          fi

      - name: Upload intraday DB
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: intraday-signals-db
          path: intraday_signals.db

      - name: Commit updated DB and CSV
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git pull --rebase origin main || true
          if [ -f "intraday_signals.db" ]; then
            git add intraday_signals.db
          fi
          if git diff --cached --quiet; then
            echo "No DB/CSV changes to commit."
          else
            git commit -m "Auto-update intraday SQLite DB and CSV [skip ci]" || true
            git push origin HEAD:main || echo "Push failed; skipping."
          fi
