name: Fetch Market Data

on:
  workflow_dispatch:
    inputs:
      stock:
        description: 'Stock Name (e.g. RELIANCE, NIFTY)'
        required: true
        default: 'NIFTY'
      from_date:
        description: 'From Date (YYYY-MM-DD)'
        required: true
        default: 'today'
      to_date:
        description: 'To Date (YYYY-MM-DD)'
        required: true
        default: 'today'
      interval:
        description: 'Interval (e.g., 1, 5, 15, 60, 1D)'
        required: true
        default: '5'

jobs:
  fetch_data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install fyers-apiv3 pandas

      - name: Write Python script
        run: |
          cat << 'EOF' > fetch_data.py
          import os
          from datetime import datetime, timedelta
          import pandas as pd
          from fyers_apiv3 import fyersModel

          CLIENT_ID      = os.environ["CLIENT_ID"]
          ACCESS_TOKEN   = os.environ["ACCESS_TOKEN"]
          FROM_DATE      = os.environ["FROM_DATE"].strip()
          TO_DATE        = os.environ["TO_DATE"].strip()
          FETCH_INTERVAL = os.environ["FETCH_INTERVAL"].strip()
          STOCK_INPUT    = os.environ["STOCK_NAME"].strip().upper()

          # Format the symbol for FYERS API
          def normalize_symbol(stock_input: str) -> str:
              if ":" in stock_input:
                  return stock_input
              special_map = {
                  "NIFTY": "NSE:NIFTY50-INDEX",
                  "BANKNIFTY": "NSE:NIFTYBANK-INDEX",
                  "FINNIFTY": "NSE:FINNIFTY-INDEX",
              }
              return special_map.get(stock_input, f"NSE:{stock_input}-EQ")

          SYMBOL = normalize_symbol(STOCK_INPUT)

          # Initialize FYERS API
          fyers = fyersModel.FyersModel(
              client_id=CLIENT_ID,
              token=ACCESS_TOKEN,
              log_path=""
          )

          def fetch_chunk(range_from: str, range_to: str):
              params = {
                  "symbol": SYMBOL,
                  "resolution": FETCH_INTERVAL,
                  "date_format": "1",
                  "range_from": range_from,
                  "range_to": range_to,
                  "cont_flag": "1",
              }
              print(f"Fetching {range_from} to {range_to} ...")
              response = fyers.history(data=params)
              status = response.get("s")
              if status != "ok":
                  raise Exception(f"API Error for {range_from} to {range_to}: {response}")
              candles = response.get("candles", [])
              return candles

          # Parse dates
          try:
              start_date = datetime.strptime(FROM_DATE, "%Y-%m-%d").date()
              end_date = datetime.strptime(TO_DATE, "%Y-%m-%d").date()
          except ValueError as e:
              raise ValueError(f"Invalid date format. Use YYYY-MM-DD. Error: {e}")

          if start_date > end_date:
              raise ValueError(f"FROM_DATE ({FROM_DATE}) cannot be after TO_DATE ({TO_DATE}).")

          # FYERS history API effectively limits the span per call (approx 100 days), so chunk it.[web:68][web:74]
          max_span_days = 99  # inclusive: start .. end

          all_candles = []
          current_start = start_date

          while current_start <= end_date:
              current_end = min(current_start + timedelta(days=max_span_days), end_date)
              chunk_from = current_start.strftime("%Y-%m-%d")
              chunk_to = current_end.strftime("%Y-%m-%d")
              candles = fetch_chunk(chunk_from, chunk_to)
              all_candles.extend(candles)
              current_start = current_end + timedelta(days=1)

          # Build DataFrame
          if all_candles:
              df = pd.DataFrame(
                  all_candles,
                  columns=["timestamp", "open", "high", "low", "close", "volume"],
              )
              # Remove any accidental duplicates on timestamp
              df = df.drop_duplicates(subset=["timestamp"]).sort_values("timestamp")

              # Convert timestamp to IST "YYYY-MM-DD HH:MM"
              df["time"] = (
                  pd.to_datetime(df["timestamp"], unit="s")
                  .dt.tz_localize("UTC")
                  .dt.tz_convert("Asia/Kolkata")
                  .dt.strftime("%Y-%m-%d %H:%M")
              )
              df = df[["time", "open", "high", "low", "close", "volume"]]
          else:
              # No data returned for the entire range
              df = pd.DataFrame(columns=["time", "open", "high", "low", "close", "volume"])
              print("Warning: No candles returned for the given date range.")

          # Save the file with the full requested date range in the name
          safe_symbol = SYMBOL.replace(":", "_").replace("-", "_")
          filename = f"{safe_symbol}_{FROM_DATE}_to_{TO_DATE}_{FETCH_INTERVAL}.csv"

          df.to_csv(filename, index=False)
          print(df.to_string(index=False))
          print(f"Saved: {filename}")
          EOF

      - name: Run Python script
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          STOCK_NAME: ${{ github.event.inputs.stock }}
          FROM_DATE: ${{ github.event.inputs.from_date }}
          TO_DATE: ${{ github.event.inputs.to_date }}
          FETCH_INTERVAL: ${{ github.event.inputs.interval }}
        run: python fetch_data.py

      - name: Upload CSV artifact
        uses: actions/upload-artifact@v4
        with:
          name: data-${{ github.event.inputs.stock }}-${{ github.event.inputs.interval }}-${{ github.event.inputs.from_date }}-to-${{ github.event.inputs.to_date }}
          path: "*.csv"
          retention-days: 1
