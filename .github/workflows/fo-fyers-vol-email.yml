name: FO-Vol-Rel-Email

on:
  schedule:
    # Every 15 minutes, 03:00–10:59 UTC (≈ 08:30–16:29 IST), Monday–Friday
    - cron: "*/15 3-10 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run-fo-vol-rel-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy fyers-apiv3

      - name: Run F&O volatility + cumulative volume email script
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          TZ: Asia/Kolkata
        run: |
          python FO_FNO_FYERS_VOL_REL_EMAIL.py
