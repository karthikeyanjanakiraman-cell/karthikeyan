name: FO-Vol-Rel-Email

on:
  workflow_dispatch: {}
  schedule:
    # Primary: every 15 min, offset by 7 min to avoid peak load
    # Runs at 03:07, 03:22, 03:37... 10:52 UTC = ~08:37–16:22 IST, Mon–Fri
    - cron: "7/15 3-10 * * 1-5"
    # Backup: single fixed run at 03:47 UTC = 09:17 IST, Mon–Fri
    - cron: "47 3 * * 1-5"

permissions:
  contents: write

jobs:
  run-fo-vol-rel-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy fyers-apiv3 statsmodels

      - name: Run F&O volatility + cumulative volume email script
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          TZ: Asia/Kolkata
        run: |
          python FO_FNO_FYERS_VOL_REL_EMAIL.py
